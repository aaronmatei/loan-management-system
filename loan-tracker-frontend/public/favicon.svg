<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LoanFix">
  <defs>
    <linearGradient id="lf-tile" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="lf-f" x1="35" y1="19" x2="50" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect width="64" height="64" rx="15" fill="url(#lf-tile)"/>
  <!-- subtle glassy edge -->
  <rect x="1.75" y="1.75" width="60.5" height="60.5" rx="13.25"
        fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>

  <!-- L (white) -->
  <g fill="#f8fafc">
    <rect x="14" y="19" width="8" height="26" rx="2"/>
    <rect x="14" y="37" width="17" height="8" rx="2"/>
  </g>

  <!-- F (cyan accent) -->
  <g fill="url(#lf-f)">
    <rect x="35" y="19" width="8" height="26" rx="2"/>
    <rect x="35" y="19" width="15" height="8" rx="2"/>
    <rect x="35" y="29" width="12" height="7" rx="2"/>
  </g>
</svg>
