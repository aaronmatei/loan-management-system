<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loading">
  <style>
    .lf-spin {
      transform-origin: 50px 50px;
      animation: lf-rotate 1.1s linear infinite;
    }
    @keyframes lf-rotate { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .lf-spin { animation-duration: 2.4s; }
    }
    .blade { fill: none; stroke: #2563eb; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <g class="lf-spin">
    <!-- three L blades at 120° apart, fading for a comet trail -->
    <g transform="rotate(0 50 50)">
      <path class="blade" d="M50 12 L50 28 L64 28" opacity="1"/>
    </g>
    <g transform="rotate(120 50 50)">
      <path class="blade" d="M50 12 L50 28 L64 28" opacity="0.55"/>
    </g>
    <g transform="rotate(240 50 50)">
      <path class="blade" d="M50 12 L50 28 L64 28" opacity="0.28"/>
    </g>
  </g>
</svg>
