# Render Blueprint — backend web service for the cost-optimized split:
#   Frontend  → Cloudflare Pages / Vercel (static)
#   Backend   → Render (this file)
#   Postgres  → Neon (DATABASE_URL)
#   Redis     → Upstash (only once Bull jobs are wired into src/)
# See DEPLOYMENT.md for the full walkthrough. Secrets are sync:false — you
# set them in the Render dashboard; they are never committed.
services:
  - type: web
    name: loanfix-backend
    runtime: node
    rootDir: loan-tracker-backend
    plan: free # free web services sleep after ~15m idle (cold starts)
    branch: main
    buildCommand: npm ci
    startCommand: npm start # node src/server.js; listens on $PORT (Render-injected)
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Neon pooled connection string, e.g.
      # postgres://user:pass@ep-xxx-pooler.region.aws.neon.tech/db?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      # Comma-separated allowed browser origins. Apex (landing + app), the
      # app subdomain, and every tenant customer portal (kuwazo.loanfix.net,
      # payoneerr.loanfix.net, …) all hit this API. The wildcard entry tells
      # the CORS matcher (app.js) to accept any one-label subdomain of
      # loanfix.net.
      - key: CORS_ORIGINS
        value: https://loanfix.net,https://www.loanfix.net,https://app.loanfix.net,https://*.loanfix.net
      # External integrations OFF by default; flip the flag + add the secrets
      # in the dashboard when ready.
      - key: SMS_ENABLED
        value: "false"
      - key: EMAIL_ENABLED
        value: "false"
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      # Cloudinary — customer KYC image storage (DP photo + ID front/back).
      # Until these are set the identity-upload gate stays OFF and the portal
      # works normally. Set the trio (or a single CLOUDINARY_URL) to activate.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MPESA_ENV
        value: sandbox
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        value: https://api.loanfix.net/api/mpesa/callback
      - key: BACKUP_SCHEDULE_ENABLED
        value: "false"
