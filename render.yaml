# Render Blueprint — backend web service for the cost-optimized split:
#   Frontend  → Cloudflare Pages / Vercel (static)
#   Backend   → Render (this file)
#   Postgres  → Neon (DATABASE_URL)
#   Redis     → Upstash (only once Bull jobs are wired into src/)
# See DEPLOYMENT.md for the full walkthrough. Secrets are sync:false — you
# set them in the Render dashboard; they are never committed.
services:
  - type: web
    name: loanfix-backend
    runtime: node
    rootDir: loan-tracker-backend
    plan: free # free web services sleep after ~15m idle (cold starts)
    branch: main
    buildCommand: npm ci
    startCommand: npm start # node src/server.js; listens on $PORT (Render-injected)
    healthCheckPath: /health
    autoDeploy: true
    # Preview environments — one fresh, ephemeral instance per PR so
    # reviewers can hit the API without bumping anyone else off prod
    # and so we can sanity-check a deploy before merging. Render
    # tears the instance down (and stops billing) when the PR closes.
    #
    # Preview deploys inherit the env vars below by default. Anything
    # marked `previewValue:` overrides for previews only — used here
    # to keep previews talking to themselves (CORS) and to a separate
    # M-Pesa sandbox / disabled SMS / disabled emails so a preview
    # branch can't accidentally fire real notifications at real
    # borrowers.
    previewsEnabled: true
    previews:
      generation: automatic # spin up on every PR opened against `branch`
      expireAfterDays: 7    # auto-tear-down a week after the PR is merged/closed
    envVars:
      - key: NODE_ENV
        value: production
      # Neon pooled connection string, e.g.
      # postgres://user:pass@ep-xxx-pooler.region.aws.neon.tech/db?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      # Comma-separated allowed browser origins. Apex (landing + app), the
      # app subdomain, and every tenant customer portal (kuwazo.lenderfest.loans,
      # payoneerr.lenderfest.loans, …) all hit this API. The wildcard entry tells
      # the CORS matcher (app.js) to accept any one-label subdomain of
      # lenderfest.loans.
      - key: CORS_ORIGINS
        value: https://lenderfest.loans,https://www.lenderfest.loans,https://app.lenderfest.loans,https://*.lenderfest.loans
      # External integrations OFF by default; flip the flag + add the secrets
      # in the dashboard when ready. Forced to "false" in preview envs too so
      # a reviewer poking at a PR can't accidentally page a real borrower
      # even if production has those flags on.
      - key: SMS_ENABLED
        value: "false"
        previewValue: "false"
      - key: EMAIL_ENABLED
        value: "true"
        previewValue: "false" # previews never send real emails
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      # Cloudinary — customer KYC image storage (DP photo + ID front/back).
      # Until these are set the identity-upload gate stays OFF and the portal
      # works normally. Set the trio (or a single CLOUDINARY_URL) to activate.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # M-Pesa always points at the sandbox in preview envs — even if
      # production ever flips to MPESA_ENV=production, a PR branch can't
      # accidentally take real money.
      - key: MPESA_ENV
        value: sandbox
        previewValue: sandbox
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        value: https://api.lenderfest.loans/api/mpesa/callback
      - key: BACKUP_SCHEDULE_ENABLED
        value: "false"
        previewValue: "false" # never run backup jobs from a preview env

  # ── Preview environment usage ─────────────────────────────────────
  # When a PR is opened, Render spins up `loanfix-backend-pr-<N>` from
  # this blueprint. The preview URL will be something like
  # https://loanfix-backend-pr-42.onrender.com — that goes into the
  # Vercel preview deployment's NEXT_PUBLIC_API_BASE (or whatever the
  # frontend env var is called) so a reviewer can validate the PR
  # against an isolated backend.
  #
  # Heads-up: previews share the SAME DATABASE_URL as production by
  # default — they're separate compute, not separate data. If a PR
  # touches schema or destructive writes, point its DATABASE_URL at a
  # disposable Neon branch instead (Neon's dashboard → Branches →
  # create from main → copy the connection string into the preview
  # env on Render). The Render docs (`previewValue` on
  # DATABASE_URL above) is where that override lands when needed.
